# Docker Compose — PRODUCTION
#
# Frontend: npm run build → nginx (port 80 in container).
# Start: ./run_docker.sh --prod
#
# Requires .env (copy from .env.example). PostgreSQL is the default database.

services:
  db:
    image: postgres:16-alpine
    container_name: completebytepos_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-completebytepos}
      POSTGRES_USER: ${POSTGRES_USER:-completebytepos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-completebytepos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - completebytepos_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-completebytepos} -d ${POSTGRES_DB:-completebytepos}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: completebytepos_backend
    hostname: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./be:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    working_dir: /app
    environment:
      - DEBUG=${DEBUG:-False}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-completebytepos}
      - DB_USER=${POSTGRES_USER:-completebytepos}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-completebytepos}
      - POSTGRES_DB=${POSTGRES_DB:-completebytepos}
      - POSTGRES_USER=${POSTGRES_USER:-completebytepos}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-completebytepos}
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "
        mkdir -p /app/logs &&
        python manage.py makemigrations --noinput || true &&
        python manage.py migrate --noinput &&
        python manage.py init_permissions --noinput || python manage.py init_permissions || true &&
        python manage.py init_modules || true &&
        python -c \"import os; os.environ.setdefault('DJANGO_SETTINGS_MODULE','config.settings'); import django; django.setup(); from settings.models import ModuleSettings, ModuleFeature; m,_=ModuleSettings.objects.get_or_create(module_name='products', defaults={'description':'Product management module','is_enabled':True}); f,_=ModuleFeature.objects.get_or_create(module=m, feature_key='product_variants', defaults={'feature_name':'Product Variants (Sizes/Colors)','description':'Enable size/color variants on products and variant picker at POS','is_enabled':False,'display_order':3}); f.is_enabled=False; f.save(update_fields=['is_enabled'])\" || true &&
        python manage.py create_users || true &&
        python manage.py collectstatic --noinput || true &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120
      "
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - completebytepos_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/').getcode()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: completebytepos_frontend
    hostname: frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - completebytepos_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  backend_static:
  backend_media:
  postgres_data:

networks:
  completebytepos_network:
    driver: bridge
